<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentinel Fraud Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .fraud-row { background-color: #ffebee; color: #c62828; font-weight: bold; }
        .header-bg { background: #1a237e; color: white; padding: 20px; }
    </style>
</head>
<body class="bg-light">
    <div class="header-bg text-center">
        <h1>🛡️ Sentinel Stream Dashboard</h1>
        <p>Real-Time Fraud Monitoring System</p>
    </div>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-12">
                <div class="card shadow">
                    <div class="card-header bg-white">
                        <h3 class="card-title">Recent Transactions</h3>
                        <button class="btn btn-primary btn-sm float-end" onclick="fetchData()">Refresh Now</button>
                    </div>
                    <div class="card-body">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Time</th>
                                    <th>Account</th>
                                    <th>Amount</th>
                                    <th>Status</th>
                                    <th>Reason</th>
                                </tr>
                            </thead>
                            <tbody id="transaction-table">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function fetchData() {
            const response = await fetch('http://localhost:8000/transactions');
            const data = await response.json();
            const tableBody = document.getElementById('transaction-table');
            tableBody.innerHTML = ''; // Clear old data

            data.forEach(tx => {
                const row = document.createElement('tr');
                if (tx.is_fraud) row.className = 'fraud-row';

                row.innerHTML = `
                    <td>${new Date(tx.processed_at).toLocaleTimeString()}</td>
                    <td>${tx.account_id}</td>
                    <td>$${tx.amount.toFixed(2)}</td>
                    <td>${tx.is_fraud ? '⚠️ FRAUD' : '✅ OK'}</td>
                    <td>${tx.fraud_reason}</td>
                `;
                tableBody.appendChild(row);
            });
        }

        // Auto-refresh every 3 seconds
        setInterval(fetchData, 3000);
        fetchData();
    </script>
</body>
</html>
